function openSection(section) {

    const hero = document.getElementById("hero");
    const sections = document.querySelectorAll(".section");
    const header = document.querySelector(".header");
    const main = document.querySelector(".main-section");

    // Hero hilang total
    hero.classList.remove("flex-[3]");
    hero.classList.add("hidden");
    hero.style.padding = "0";

    // Reset semua section
    sections.forEach(sec => {
        sec.classList.remove("flex-[8]");
        sec.classList.add("flex-[1]");
        main.classList.remove("hidden");
        main.classList.add("flex");
    });

    // Expand section yang diklik
    section.classList.remove("flex-[1]");
    section.classList.add("flex-[8]");
  


}
function resetLayout() {

    const hero = document.getElementById("hero");
    const sections = document.querySelectorAll(".section");
    const header = document.querySelector(".header");
    const main = document.querySelector(".main-section");

    hero.classList.remove("hidden");
    hero.classList.add("flex-[3]", "block");
    hero.style.padding = "2rem";

    sections.forEach(sec => {
        sec.classList.remove("flex-[8]");
        sec.classList.add("flex-[1]");
        main.classList.remove("flex");
        main.classList.add("hidden", "block");
    });

   
    
}
